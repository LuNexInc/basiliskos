name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: basiliskos-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-quality:
    name: Windows quality and bundles
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.30.1
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          toolchain: stable
          components: rustfmt, clippy
          cache-workspaces: src-tauri

      - name: Install locked JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Run all quality and fault-harness checks
        run: pnpm test:all

      - name: Build canonical NSIS bundle
        run: pnpm bundle

  security:
    name: Dependency and secret gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Check tracked files for sensitive values
        shell: pwsh
        run: ./scripts/check-sensitive-data.ps1 -SelfTest

      - name: Verify runtime-log leak detector
        shell: pwsh
        run: ./scripts/check-runtime-log-secrets.ps1 -SelfTest

      - name: Audit the Windows Rust dependency graph
        uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
        with:
          command: check
          arguments: ""
          command-arguments: advisories
          manifest-path: src-tauri/Cargo.toml

      - name: Scan lockfiles with OSV
        uses: google/osv-scanner-action/osv-scanner-action@375a0e8ebdc98e99b02ac4338a724f5750f21213 # v2.3.1
        with:
          scan-args: --lockfile=./pnpm-lock.yaml
